name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Frontend Install & Check
        working-directory: ./frontend
        run: |
          npm ci
          npx eslint .
          npx tsc --noEmit
          
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Backend Install & Check
        working-directory: ./backend
        run: |
          uv sync --dev
          uv run ruff check .
          uv run mypy . --strict

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Test
        working-directory: ./backend
        run: |
          uv sync --dev
          uv run pytest tests/ -v --tb=short --asyncio-mode=auto --cov=. --cov-report=xml
          
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Test
        working-directory: ./frontend
        run: |
          npm ci
          npm run test -- --coverage
          
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: job-discovery:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check-workflow-docs:
    name: Check Workflow Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Check todo and lessons
        run: |
          test -f docs/tasks/todo.md && [ $(wc -l < docs/tasks/todo.md) -gt 1 ]
          test -f docs/tasks/lessons.md && [ $(wc -l < docs/tasks/lessons.md) -gt 1 ]

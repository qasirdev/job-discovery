name: CI

# Production-grade CI pipeline for the AI-Powered Job Discovery Platform.
# Reference: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint & static type checks — fast gate, fails immediately on violations
  # ---------------------------------------------------------------------------
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install & lint
        working-directory: ./frontend
        run: |
          npm ci
          npx eslint .
          npx tsc --noEmit

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend install, lint & type check
        working-directory: ./backend
        run: |
          uv sync --dev
          uv run ruff check .
          uv run mypy .

  # ---------------------------------------------------------------------------
  # 2. Twelve-Factor XI — no print() calls allowed in backend/ (JD-71)
  #    Factor XI mandates structured JSON logging via get_logger everywhere.
  #    This gate fails the build immediately if any print() is found.
  # ---------------------------------------------------------------------------
  ci-print-check:
    name: "Factor XI: No print() in backend"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v6
      - name: Check for print() calls in backend/
        run: |
          if grep -rn 'print(' backend/ \
              --include="*.py" \
              --exclude-dir=".venv" \
              --exclude-dir="__pycache__" \
              --exclude-dir=".mypy_cache"; then
            echo "::error::print() calls found in backend/. Replace with get_logger calls (Twelve-Factor XI)."
            exit 1
          fi
          echo "Factor XI check passed — no print() calls found in backend/."

  # ---------------------------------------------------------------------------
  # 3. Backend unit tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-type-check, ci-print-check]
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        working-directory: ./backend
        run: |
          uv sync --dev
          uv run pytest tests/ -v --tb=short --asyncio-mode=auto \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # 3. Frontend unit tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run tests
        working-directory: ./frontend
        run: |
          npm ci
          npm run test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ---------------------------------------------------------------------------
  # 4. Security scanning — Bandit (Python) + OWASP dependency check
  #    Per proposal-v4.md: "Trivy for images, Bandit for Python"
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install Bandit
        working-directory: ./backend
        run: |
          uv sync --dev
          uv pip install bandit

      - name: Run Bandit (Python security audit)
        working-directory: ./backend
        run: |
          uv run bandit -r . \
            --exclude ./.venv,./tests,./admin/clear_db.py \
            -ll \
            -f json \
            -o bandit-report.json || true
          cat bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 5. Prompt schema regression — fast, schema-only, no LLM calls.
  #    Runs on every PR and every push. Blocks if any eval fixture is malformed.
  #    JD-39: CI prompt regression step.
  # ---------------------------------------------------------------------------
  prompt-regression-fast:
    name: Prompt Regression (schema-only)
    uses: ./.github/workflows/eval-regression.yml
    needs: lint-and-type-check
    with:
      agent: all
      fast: true

  # ---------------------------------------------------------------------------
  # 6. Docker build validation
  # ---------------------------------------------------------------------------

  docker-build-push:
    name: Docker Build, Push & Sign
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-backend, test-frontend, prompt-regression-fast]
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: acrjobdiscovery.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          
      - name: Log in to Amazon ECR
        uses: docker/login-action@v3
        with:
          registry: public.ecr.aws/your-registry
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/qasirmehmood/job-discovery:${{ github.sha }}
            ghcr.io/qasirmehmood/job-discovery:latest
            acrjobdiscovery.azurecr.io/job-discovery:${{ github.sha }}
            acrjobdiscovery.azurecr.io/job-discovery:latest
            public.ecr.aws/your-registry/job-discovery:${{ github.sha }}
            public.ecr.aws/your-registry/job-discovery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/qasirmehmood/job-discovery@${{ steps.build_push.outputs.digest }}

      - name: Verify image signature
        run: cosign verify --certificate-identity-regexp=.* --certificate-oidc-issuer=https://token.actions.githubusercontent.com ghcr.io/qasirmehmood/job-discovery@${{ steps.build_push.outputs.digest }}

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker-build-push
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: job-discovery:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "job-discovery:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 8. Full LLM prompt regression — only on push to main (post-merge gate).
  #    Blocks deployment if DeepEval or Ragas thresholds drop.
  #    JD-39: CI prompt regression step (full).
  # ---------------------------------------------------------------------------
  linkedin-eval-full:
    name: LinkedIn Full Eval (main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/eval-regression.yml
    needs: docker-build-push
    with:
      agent: linkedin
      fast: false
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  jobserve-eval-full:
    name: JobServe Full Eval (main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/eval-regression.yml
    needs: docker-build-push
    with:
      agent: jobserve
      fast: false
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ---------------------------------------------------------------------------
  # 8b. DeepEval RAG Eval (JD-48)
  # ---------------------------------------------------------------------------
  rag-eval-full:
    name: RAG Eval Regression (main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/eval-regression.yml
    needs: docker-build-push
    with:
      agent: rag
      fast: false
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ---------------------------------------------------------------------------
  # 9. Deployment readiness check — all gates must pass before deploy
  # ---------------------------------------------------------------------------
  check-workflow-docs:
    name: Check Workflow Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check todo and lessons
        run: |
          if [ ! -f docs/tasks/todo.md ] || [ $(wc -l < docs/tasks/todo.md) -le 1 ]; then
            echo "::error::docs/tasks/todo.md is missing or empty"
            exit 1
          fi
          if [ ! -f docs/tasks/lessons.md ] || [ $(wc -l < docs/tasks/lessons.md) -le 1 ]; then
            echo "::error::docs/tasks/lessons.md is missing or empty"
            exit 1
          fi
          echo "Workflow documentation check passed."


  terraform-validate:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        
      - name: Cache Azure Terraform
        uses: actions/cache@v4
        with:
          path: infrastructure/terraform/azure/.terraform
          key: ${{ runner.os }}-tf-azure-${{ hashFiles('infrastructure/terraform/azure/.terraform.lock.hcl') }}
          
      - name: Terraform Init Azure
        working-directory: infrastructure/terraform/azure
        run: terraform init -backend=false
        
      - name: Terraform Validate Azure
        working-directory: infrastructure/terraform/azure
        run: terraform validate
        
      - name: Cache AWS Terraform
        uses: actions/cache@v4
        with:
          path: infrastructure/terraform/aws/.terraform
          key: ${{ runner.os }}-tf-aws-${{ hashFiles('infrastructure/terraform/aws/.terraform.lock.hcl') }}

      - name: Terraform Init AWS
        working-directory: infrastructure/terraform/aws
        run: terraform init -backend=false
        
      - name: Terraform Validate AWS
        working-directory: infrastructure/terraform/aws
        run: terraform validate
        
      - name: Terraform Plan Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infrastructure/terraform/azure
        run: terraform plan -out=plan.tfplan
        
      - name: Upload Azure Plan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: azure-tf-plan
          path: infrastructure/terraform/azure/plan.tfplan

      - name: Terraform Plan AWS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infrastructure/terraform/aws
        run: terraform plan -out=plan.tfplan
        
      - name: Upload AWS Plan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: aws-tf-plan
          path: infrastructure/terraform/aws/plan.tfplan

  terraform-apply:
    name: Terraform Apply
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    needs: [terraform-validate, docker-build-push]
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      
      - name: Download Azure Plan
        uses: actions/download-artifact@v4
        with:
          name: azure-tf-plan
          path: infrastructure/terraform/azure/
          
      - name: Terraform Apply Azure
        working-directory: infrastructure/terraform/azure
        run: |
          terraform init
          terraform apply -auto-approve plan.tfplan

      - name: Download AWS Plan
        uses: actions/download-artifact@v4
        with:
          name: aws-tf-plan
          path: infrastructure/terraform/aws/
          
      - name: Terraform Apply AWS
        working-directory: infrastructure/terraform/aws
        run: |
          terraform init
          terraform apply -auto-approve plan.tfplan

      - name: Create Release Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag release/${GITHUB_SHA::7}
          git push origin release/${GITHUB_SHA::7}
